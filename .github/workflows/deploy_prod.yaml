name: Deploy Prod

on:
  push:
    branches:
      - "main"
    paths:
      - "dashboard/**/*"
  workflow_dispatch:

env:
  NODE_VERSION: 24

jobs:
  build_and_deploy:
    name: build-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Transfer Build Output
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CI_EC2_DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.CI_EC2_DEPLOY_KEY }}
          source: dashboard/.output
          target: ~/qaqc-dashboard
          overwrite: true
          tar_dereference: true

      - name: Restart Service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CI_EC2_DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.CI_EC2_DEPLOY_KEY }}
          envs: GITHUB_SHA
          script: |
            cd ~/qaqc-dashboard
            git fetch origin
            git reset --hard $GITHUB_SHA
            cd dashboard
            npm install --omit=dev
            if systemctl is-active --quiet qaqc-dashboard; then
              sudo systemctl restart qaqc-dashboard
            fi
